name: Deploy Story Generator

on:
  push:
    branches: [main, claude/improve-accessibility-responsive-I5fjq, claude/story-generator-app-B8a8C]
    paths:
      - 'story-generator/frontend/**'
      - 'story-generator/frontend-static/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: story-generator/frontend/package-lock.json

      - name: Build frontend
        working-directory: story-generator/frontend
        run: |
          npm ci
          npm run build

      - name: Copy static frontend
        run: |
          mkdir -p story-generator/frontend/dist/story-generator/frontend-static
          cp story-generator/frontend-static/index.html story-generator/frontend/dist/story-generator/frontend-static/index.html

      - name: Copy index.html to 404.html for SPA routing
        run: cp story-generator/frontend/dist/index.html story-generator/frontend/dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: story-generator/frontend/dist
