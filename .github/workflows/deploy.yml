name: Deploy Story Generator

on:
  push:
    branches: [main]
    paths:
      - 'story-generator/frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: story-generator/frontend/package-lock.json

      - name: Install dependencies
        working-directory: story-generator/frontend
        run: npm ci

      - name: Build
        working-directory: story-generator/frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: story-generator/frontend/dist
