<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    .prose strong { font-weight: 600; }
    .prose p { margin-bottom: 0.75em; line-height: 1.6; }
    .prose ul, .prose ol { padding-left: 1.4em; margin-bottom: 0.75em; }
    .prose li { margin-bottom: 0.3em; line-height: 1.6; }
    .prose h1, .prose h2, .prose h3 {
      font-weight: 600;
      margin-top: 1.4em;
      margin-bottom: 0.5em;
      line-height: 1.3;
    }
    .prose a { color: #6366f1; text-decoration: underline; }
    .prose hr { border-color: #e5e7eb; margin: 1em 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .skeleton { animation: pulse 1.5s ease-in-out infinite; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased h-screen overflow-hidden flex flex-col">

  <!-- ── API Key Header ─────────────────────────────────────────────────── -->
  <header class="flex-shrink-0 bg-white border-b border-gray-200 px-4 py-2.5 flex items-center gap-3">
    <span class="text-sm font-semibold text-gray-700 whitespace-nowrap">Story Generator</span>
    <div class="w-px h-4 bg-gray-200"></div>
    <label class="text-xs font-medium text-gray-500 whitespace-nowrap">Anthropic API Key</label>
    <input
      type="password"
      id="api-key"
      placeholder="sk-ant-api03-..."
      class="flex-1 max-w-xs border border-gray-200 rounded-lg px-3 py-1.5 text-xs font-mono text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent"
    />
    <span class="text-xs text-gray-400 hidden sm:block">Wird nur lokal verwendet – nicht gespeichert, nicht übertragen</span>
  </header>

  <!-- ── 3-Panel Layout ─────────────────────────────────────────────────── -->
  <main class="flex-1 grid overflow-hidden" style="grid-template-columns: 280px 1fr 320px;">

    <!-- Left: Input Panel -->
    <aside class="border-r border-gray-200 bg-white overflow-y-auto flex flex-col">
      <div class="p-4 flex flex-col gap-5 flex-1">

        <!-- Generate section -->
        <section>
          <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Anforderung</h2>
          <textarea
            id="raw-input"
            rows="9"
            placeholder="Beschreibe die Anforderung in deinen eigenen Worten — Slack-Nachricht, Sticky Note, spontane Idee…"
            class="w-full resize-none border border-gray-200 rounded-lg px-3 py-2.5 text-sm text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent leading-relaxed"
          ></textarea>
          <button
            id="generate-btn"
            onclick="handleGenerate()"
            class="mt-3 w-full bg-indigo-500 hover:bg-indigo-600 text-white font-medium py-2.5 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 text-sm"
          >
            Story generieren
          </button>
        </section>

        <!-- Refine section – hidden until first story is generated -->
        <section id="refine-section" class="hidden border-t border-gray-100 pt-4">
          <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Refinement-Anweisung</h2>
          <textarea
            id="refinement-input"
            rows="4"
            placeholder='z.B. "Mach AK-2 spezifischer" oder "Berücksichtige den Offline-Fall"'
            class="w-full resize-none border border-gray-200 rounded-lg px-3 py-2.5 text-sm text-gray-800 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent leading-relaxed"
          ></textarea>
          <button
            id="refine-btn"
            onclick="handleRefine()"
            class="mt-3 w-full bg-white border border-indigo-500 text-indigo-600 hover:bg-indigo-50 font-medium py-2.5 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 text-sm"
          >
            Story verfeinern
          </button>
        </section>

      </div>
    </aside>

    <!-- Center: Story Output Panel -->
    <section class="bg-white overflow-y-auto flex flex-col">
      <div class="flex-shrink-0 flex items-center justify-between px-4 py-3 border-b border-gray-100">
        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Story</h2>
        <button
          id="copy-btn"
          onclick="handleCopy()"
          class="hidden items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors"
        >
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          <span id="copy-label">Kopieren</span>
        </button>
      </div>

      <div id="story-output" class="flex-1 px-6 py-5">
        <!-- Empty state -->
        <div id="story-empty" class="flex flex-col items-center justify-center h-full min-h-48 text-center">
          <div class="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center mb-4">
            <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </div>
          <p class="text-sm text-gray-500">Gib eine Anforderung ein und klicke auf „Story generieren".</p>
        </div>

        <!-- Skeleton loader -->
        <div id="story-skeleton" class="hidden space-y-3">
          <div class="skeleton h-5 bg-gray-200 rounded w-2/3"></div>
          <div class="skeleton h-3 bg-gray-100 rounded w-full"></div>
          <div class="skeleton h-3 bg-gray-100 rounded w-5/6"></div>
          <div class="skeleton h-3 bg-gray-100 rounded w-4/6"></div>
          <div class="skeleton h-5 bg-gray-200 rounded w-1/2 mt-5"></div>
          <div class="skeleton h-3 bg-gray-100 rounded w-full"></div>
          <div class="skeleton h-3 bg-gray-100 rounded w-full"></div>
          <div class="skeleton h-3 bg-gray-100 rounded w-3/4"></div>
          <div class="skeleton h-5 bg-gray-200 rounded w-1/3 mt-5"></div>
          <div class="skeleton h-3 bg-gray-100 rounded w-full"></div>
          <div class="skeleton h-3 bg-gray-100 rounded w-5/6"></div>
        </div>

        <!-- Rendered story -->
        <div id="story-content" class="hidden prose text-sm text-gray-800 max-w-none"></div>
      </div>
    </section>

    <!-- Right: Insights Panel -->
    <aside class="border-l border-gray-200 bg-amber-50 overflow-y-auto flex flex-col">
      <div class="flex-shrink-0 px-4 py-3 border-b border-amber-100">
        <h2 class="text-xs font-semibold text-amber-700 uppercase tracking-wider">Refinement Hinweise</h2>
      </div>

      <div id="insights-output" class="flex-1 px-4 py-4">
        <!-- Empty state -->
        <div id="insights-empty">
          <p class="text-xs text-center py-8" style="color: rgba(180,120,20,0.5);">
            KI-Hinweise erscheinen hier nach der Generierung.
          </p>
        </div>

        <!-- Skeleton -->
        <div id="insights-skeleton" class="hidden space-y-2">
          <div class="skeleton h-3 bg-amber-100 rounded w-full"></div>
          <div class="skeleton h-3 bg-amber-100 rounded w-5/6"></div>
          <div class="skeleton h-3 bg-amber-100 rounded w-4/6"></div>
          <div class="skeleton h-3 bg-amber-100 rounded w-full mt-3"></div>
          <div class="skeleton h-3 bg-amber-100 rounded w-3/4"></div>
        </div>

        <!-- Rendered hints -->
        <div id="insights-content" class="hidden prose text-xs text-amber-900 max-w-none"></div>
      </div>
    </aside>

  </main>

  <!-- ── JavaScript ─────────────────────────────────────────────────────── -->
  <script>
    // ── State ──────────────────────────────────────────────────────────────
    let conversationHistory = [];  // multi-turn history for refinements
    let currentStoryText = '';     // raw text of current story (for clipboard)

    // ── System Prompt ──────────────────────────────────────────────────────
    const SYSTEM_PROMPT = `Du bist ein erfahrener Senior Software Engineer, der einem Product Owner dabei hilft, Anforderungen zu strukturieren. Du denkst kritisch wie jemand, der das Feature später implementieren muss. Du klärst Mehrdeutigkeiten, formulierst testbare Akzeptanzkriterien und identifizierst fehlende Informationen. Deine Outputs folgen immer exakt dem vorgegebenen Template. Sprache: Deutsch.

Dein Output folgt IMMER exakt diesem Template — ohne Abweichungen:

**Titel** — [kurzer, präziser Titel]

**Ausgangslage**
[Das Problem in klarer Sprache, 2-4 Sätze]

**Akzeptanzkriterien**
- AK-1: [testbares, spezifisches Kriterium]
- AK-2: [testbares, spezifisches Kriterium]
[weitere AKs nach Bedarf]

**Weitere Informationen**
[Links aus dem Input unverändert übernehmen. Kontext, Annahmen, technische Hinweise.]

**Refinement Hinweise**
[Fehlende Informationen, Warnungen und Empfehlungen für das Refinement-Meeting. Wenn keine vorhanden: "Keine offenen Punkte identifiziert."]`;

    // ── Helpers ────────────────────────────────────────────────────────────
    function getApiKey() {
      return document.getElementById('api-key').value.trim();
    }

    function parseOutput(text) {
      const parts = text.split(/^\*\*Refinement Hinweise\*\*/m);
      if (parts.length >= 2) {
        return {
          generatedStory: parts[0].trim(),
          refinementHints: parts.slice(1).join('**Refinement Hinweise**').trim(),
        };
      }
      return { generatedStory: text.trim(), refinementHints: '' };
    }

    function renderMarkdown(text) {
      return DOMPurify.sanitize(marked.parse(text));
    }

    function setLoading(isLoading) {
      const genBtn  = document.getElementById('generate-btn');
      const refBtn  = document.getElementById('refine-btn');
      const rawIn   = document.getElementById('raw-input');
      const refIn   = document.getElementById('refinement-input');

      genBtn.disabled = isLoading;
      if (refBtn) refBtn.disabled = isLoading;
      rawIn.disabled  = isLoading;
      if (refIn) refIn.disabled = isLoading;

      if (isLoading) {
        genBtn.innerHTML = '<span class="spinner"></span> Story wird generiert…';
        if (refBtn) refBtn.innerHTML = '<span class="spinner" style="border-color:#6366f1;border-top-color:transparent;"></span> Story wird verfeinert…';
      } else {
        genBtn.innerHTML = 'Story generieren';
        if (refBtn) refBtn.innerHTML = 'Story verfeinern';
      }
    }

    function showSkeleton() {
      document.getElementById('story-empty').classList.add('hidden');
      document.getElementById('story-content').classList.add('hidden');
      document.getElementById('story-skeleton').classList.remove('hidden');
      document.getElementById('insights-empty').classList.add('hidden');
      document.getElementById('insights-content').classList.add('hidden');
      document.getElementById('insights-skeleton').classList.remove('hidden');
      document.getElementById('copy-btn').classList.remove('flex');
      document.getElementById('copy-btn').classList.add('hidden');
    }

    function showStory(generatedStory, refinementHints) {
      document.getElementById('story-skeleton').classList.add('hidden');
      document.getElementById('story-empty').classList.add('hidden');
      const content = document.getElementById('story-content');
      content.innerHTML = renderMarkdown(generatedStory);
      content.classList.remove('hidden');

      document.getElementById('insights-skeleton').classList.add('hidden');
      document.getElementById('insights-empty').classList.add('hidden');
      const insightsContent = document.getElementById('insights-content');
      if (refinementHints) {
        insightsContent.innerHTML = renderMarkdown(refinementHints);
        insightsContent.classList.remove('hidden');
      } else {
        insightsContent.classList.add('hidden');
        document.getElementById('insights-empty').classList.remove('hidden');
        document.getElementById('insights-empty').innerHTML =
          '<p class="text-xs text-amber-700/60 py-2">Keine offenen Punkte identifiziert.</p>';
      }

      document.getElementById('copy-btn').classList.remove('hidden');
      document.getElementById('copy-btn').classList.add('flex');
      document.getElementById('refine-section').classList.remove('hidden');
    }

    function showError(message) {
      document.getElementById('story-skeleton').classList.add('hidden');
      document.getElementById('insights-skeleton').classList.add('hidden');
      const content = document.getElementById('story-content');
      content.innerHTML = `<div class="rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
        <strong>Fehler:</strong> ${DOMPurify.sanitize(message)}
      </div>`;
      content.classList.remove('hidden');
      document.getElementById('story-empty').classList.add('hidden');
    }

    // ── Anthropic API Call ─────────────────────────────────────────────────
    async function callClaude(messages) {
      const apiKey = getApiKey();
      if (!apiKey) {
        throw new Error('Bitte zuerst den Anthropic API Key oben eingeben.');
      }

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-5',
          max_tokens: 2048,
          system: SYSTEM_PROMPT,
          messages,
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err?.error?.message ?? `API-Fehler ${response.status}`);
      }

      const data = await response.json();
      return data.content
        .filter(b => b.type === 'text')
        .map(b => b.text)
        .join('');
    }

    // ── Generate ───────────────────────────────────────────────────────────
    async function handleGenerate() {
      const rawInput = document.getElementById('raw-input').value.trim();
      if (!rawInput) return;

      setLoading(true);
      showSkeleton();

      try {
        const messages = [{ role: 'user', content: rawInput }];
        const fullText = await callClaude(messages);

        // Build conversation history for future refinements
        conversationHistory = [
          { role: 'user', content: rawInput },
          { role: 'assistant', content: fullText },
        ];

        const { generatedStory, refinementHints } = parseOutput(fullText);
        currentStoryText = generatedStory;
        showStory(generatedStory, refinementHints);
      } catch (err) {
        showError(err.message);
      } finally {
        setLoading(false);
      }
    }

    // ── Refine ─────────────────────────────────────────────────────────────
    async function handleRefine() {
      const instruction = document.getElementById('refinement-input').value.trim();
      if (!instruction || conversationHistory.length === 0) return;

      setLoading(true);
      showSkeleton();

      try {
        const messages = [
          ...conversationHistory,
          { role: 'user', content: instruction },
        ];
        const fullText = await callClaude(messages);

        // Append to conversation history
        conversationHistory.push({ role: 'user', content: instruction });
        conversationHistory.push({ role: 'assistant', content: fullText });

        const { generatedStory, refinementHints } = parseOutput(fullText);
        currentStoryText = generatedStory;
        showStory(generatedStory, refinementHints);
        document.getElementById('refinement-input').value = '';
      } catch (err) {
        showError(err.message);
      } finally {
        setLoading(false);
      }
    }

    // ── Copy ───────────────────────────────────────────────────────────────
    async function handleCopy() {
      if (!currentStoryText) return;
      try {
        await navigator.clipboard.writeText(currentStoryText);
        const label = document.getElementById('copy-label');
        label.textContent = 'Kopiert!';
        setTimeout(() => { label.textContent = 'Kopieren'; }, 2000);
      } catch {
        alert('Kopieren fehlgeschlagen. Bitte manuell kopieren.');
      }
    }

    // ── Enter-Key Shortcuts ────────────────────────────────────────────────
    document.getElementById('raw-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) handleGenerate();
    });
    document.addEventListener('DOMContentLoaded', () => {
      const refIn = document.getElementById('refinement-input');
      if (refIn) {
        refIn.addEventListener('keydown', e => {
          if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) handleRefine();
        });
      }
    });
  </script>

</body>
</html>
